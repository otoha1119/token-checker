<svg viewBox="0 0 880 220" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'SF Pro Text', Helvetica, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0a84ff"/>
    </marker>
  </defs>

  <!-- box 1: source -->
  <rect x="20"  y="60" width="160" height="100" rx="10" fill="#1c1c1e" stroke="#3a3a3c"/>
  <text x="100" y="92"  fill="#ffffff" font-size="13" font-weight="600" text-anchor="middle">ソースコード</text>
  <text x="100" y="116" fill="#8e8e93" font-size="11" text-anchor="middle">Sources/TokenChecker/</text>
  <text x="100" y="132" fill="#8e8e93" font-size="11" text-anchor="middle">Package.swift</text>
  <text x="100" y="148" fill="#8e8e93" font-size="11" text-anchor="middle">Resources/Info.plist</text>

  <!-- arrow + label -->
  <line x1="180" y1="110" x2="240" y2="110" stroke="#0a84ff" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="210" y="100" fill="#0a84ff" font-size="11" text-anchor="middle">swift build</text>

  <!-- box 2: binary -->
  <rect x="240" y="60" width="160" height="100" rx="10" fill="#1c1c1e" stroke="#3a3a3c"/>
  <text x="320" y="92"  fill="#ffffff" font-size="13" font-weight="600" text-anchor="middle">バイナリ</text>
  <text x="320" y="116" fill="#8e8e93" font-size="11" text-anchor="middle">.build/release/</text>
  <text x="320" y="132" fill="#8e8e93" font-size="11" text-anchor="middle">TokenChecker</text>

  <!-- arrow -->
  <line x1="400" y1="110" x2="460" y2="110" stroke="#0a84ff" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="430" y="100" fill="#0a84ff" font-size="11" text-anchor="middle">build.sh で組立</text>

  <!-- box 3: .app -->
  <rect x="460" y="60" width="180" height="100" rx="10" fill="#1c1c1e" stroke="#3a3a3c"/>
  <text x="550" y="92"  fill="#ffffff" font-size="13" font-weight="600" text-anchor="middle">TokenChecker.app</text>
  <text x="550" y="116" fill="#8e8e93" font-size="11" text-anchor="middle">Contents/MacOS/</text>
  <text x="550" y="132" fill="#8e8e93" font-size="11" text-anchor="middle">Contents/Info.plist</text>
  <text x="550" y="148" fill="#8e8e93" font-size="10" text-anchor="middle">＋ codesign で署名</text>

  <!-- arrow -->
  <line x1="640" y1="110" x2="700" y2="110" stroke="#0a84ff" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="670" y="100" fill="#0a84ff" font-size="11" text-anchor="middle">--install</text>

  <!-- box 4: /Applications -->
  <rect x="700" y="60" width="160" height="100" rx="10" fill="#0a84ff" stroke="#0a84ff"/>
  <text x="780" y="92"  fill="#ffffff" font-size="13" font-weight="600" text-anchor="middle">/Applications/</text>
  <text x="780" y="116" fill="#ffffff" font-size="11" text-anchor="middle">TokenChecker.app</text>
  <text x="780" y="138" fill="#ffffff" font-size="10" text-anchor="middle">Finder のアプリケーション</text>
  <text x="780" y="152" fill="#ffffff" font-size="10" text-anchor="middle">フォルダで見える</text>

  <!-- caption -->
  <text x="440" y="195" fill="#8e8e93" font-size="12" text-anchor="middle">
    1 コマンドで全部やる: ./Scripts/build.sh --install
  </text>
</svg>
